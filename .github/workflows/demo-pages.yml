name: Demo (GitHub Pages)

# Builds the offline demo single-file (frontend/dist-demo) and publishes it to
# GitHub Pages on every push to main. The live URL is
# https://konananachan.github.io/OpenPoly/
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege + what Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build demo single-file
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6.0.3

      # Pages must already be enabled with "GitHub Actions" as the source
      # (Settings → Pages). Token-based auto-enable isn't permitted on this
      # repo, so this step only reads the existing config.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Build demo
        run: yarn demo:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: frontend/dist-demo

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
